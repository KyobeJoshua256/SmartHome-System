{% extends 'admin/model/list.html' %}

{% block body %}
  {% if otp_stats %}
  <div class="row mb-3">
    <div class="col-sm-3">
      <div class="card text-white bg-primary">
        <div class="card-body py-2 text-center">
          <strong>{{ otp_stats.total }}</strong> Total
        </div>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="card text-white bg-success">
        <div class="card-body py-2 text-center">
          <strong>{{ otp_stats.active }}</strong> Active
        </div>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="card text-white bg-secondary">
        <div class="card-body py-2 text-center">
          <strong>{{ otp_stats.used }}</strong> Used
        </div>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="card text-white bg-warning">
        <div class="card-body py-2 text-center">
          <strong>{{ otp_stats.expired }}</strong> Expired
        </div>
      </div>
    </div>
  </div>
  {% endif %}
  {{ super() }}
{% endblock %}
