{% extends 'admin/model/create.html' %}

{% block tail %}
  {{ super() }}

  <style>
    /* Reorder form fields - move password section up */
    .form-horizontal .form-group {
      position: relative;
    }
    
    /* Target the password and confirm fields and move them after email */
    .field-password {
      order: 5;
    }
    .field-password-confirm {
      order: 6;
    }
    
    .pw-wrapper {
      position: relative;
    }
    .pw-wrapper .form-control {
      padding-right: 2.8rem;
    }
    .pw-toggle {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6c757d;
      padding: 0;
      line-height: 1;
    }
    .pw-toggle:hover { color: #343a40; }

    /* Strength bar */
    #pw-strength-bar {
      height: 4px;
      border-radius: 2px;
      transition: width 0.3s, background-color 0.3s;
      width: 0;
    }
    #pw-strength-label {
      font-size: 0.78rem;
    }
    
    /* Add some spacing */
    .field-password, .field-password-confirm {
      margin-top: 1rem;
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // -----------------------------------------------------------------
      // OPTIONAL: Reorder fields using JavaScript (more reliable than CSS)
      // -----------------------------------------------------------------
      function reorderFormFields() {
        var form = document.querySelector('.form-horizontal');
        if (!form) return;
        
        // Find all form groups
        var formGroups = form.querySelectorAll('.form-group');
        
        // Find specific fields
        var emailGroup = null;
        var passwordGroup = null;
        var confirmGroup = null;
        var otherFields = [];
        
        formGroups.forEach(function(group) {
          var fieldId = group.querySelector('[id^="field-"]')?.id;
          if (fieldId === 'field-email') {
            emailGroup = group;
          } else if (fieldId === 'field-password') {
            passwordGroup = group;
          } else if (fieldId === 'field-password-confirm') {
            confirmGroup = group;
          } else {
            otherFields.push(group);
          }
        });
        
        // If we found email group, move password fields right after it
        if (emailGroup && passwordGroup && confirmGroup) {
          // Get the parent (form)
          var parent = emailGroup.parentNode;
          
          // Find index of email group
          var emailIndex = Array.from(parent.children).indexOf(emailGroup);
          
          // Remove password groups if they exist somewhere else
          if (passwordGroup.parentNode) passwordGroup.remove();
          if (confirmGroup.parentNode) confirmGroup.remove();
          
          // Insert password fields after email
          if (parent.children[emailIndex + 1]) {
            parent.insertBefore(passwordGroup, parent.children[emailIndex + 1]);
            parent.insertBefore(confirmGroup, parent.children[emailIndex + 2]);
          } else {
            parent.appendChild(passwordGroup);
            parent.appendChild(confirmGroup);
          }
        }
      }
      
      // Call the reorder function
      reorderFormFields();

      // -----------------------------------------------------------------
      // 1. Show / hide toggle for each password field
      // -----------------------------------------------------------------
      function addToggle(inputId) {
        var input = document.getElementById(inputId);
        if (!input) {
          console.warn("Field not found:", inputId);
          return;
        }

        var wrapper = document.createElement("div");
        wrapper.className = "pw-wrapper";
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);

        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pw-toggle";
        btn.title = "Show / hide";
        btn.innerHTML = '<i class="fas fa-eye"></i>';
        wrapper.appendChild(btn);

        btn.addEventListener("click", function () {
          var isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          btn.innerHTML = isHidden
            ? '<i class="fas fa-eye-slash"></i>'
            : '<i class="fas fa-eye"></i>';
        });
      }

      addToggle("field-password");
      addToggle("field-password-confirm");

      // -----------------------------------------------------------------
      // 2. Live password-strength indicator
      // -----------------------------------------------------------------
      var pwInput = document.getElementById("field-password");
      if (!pwInput) {
        console.warn("Password input not found");
        return;
      }

      var strengthHtml = [
        '<div class="mt-1">',
        '  <div class="progress" style="height:4px;background:#e9ecef">',
        '    <div id="pw-strength-bar" class="progress-bar"></div>',
        '  </div>',
        '  <small id="pw-strength-label" class="text-muted"></small>',
        '</div>'
      ].join("");

      var formGroup = pwInput.closest(".form-group");
      if (formGroup) {
        formGroup.insertAdjacentHTML("beforeend", strengthHtml);
      }

      var bar   = document.getElementById("pw-strength-bar");
      var label = document.getElementById("pw-strength-label");

      function scorePassword(pw) {
        var score = 0;
        if (!pw) return { pct: "0%", color: "", text: "" };
        if (pw.length >= 8)  score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        var levels = [
          { pct: "20%",  color: "#dc3545", text: "Very weak"  },
          { pct: "40%",  color: "#fd7e14", text: "Weak"       },
          { pct: "60%",  color: "#ffc107", text: "Fair"       },
          { pct: "80%",  color: "#20c997", text: "Strong"     },
          { pct: "100%", color: "#198754", text: "Very strong" },
        ];
        var idx = Math.min(score, levels.length) - 1;
        return idx >= 0 ? levels[idx] : { pct: "0%", color: "", text: "" };
      }

      pwInput.addEventListener("input", function () {
        if (!bar || !label) return;
        var result = scorePassword(pwInput.value);
        bar.style.width           = result.pct   || "0%";
        bar.style.backgroundColor = result.color || "transparent";
        label.textContent         = result.text  || "";
        label.style.color         = result.color || "";
      });

      // -----------------------------------------------------------------
      // 3. Live confirm-match indicator
      // -----------------------------------------------------------------
      var confirmInput = document.getElementById("field-password-confirm");
      if (!confirmInput) return;

      function checkMatch() {
        if (!confirmInput.value) {
          confirmInput.classList.remove("is-valid", "is-invalid");
          return;
        }
        var match = pwInput.value === confirmInput.value;
        confirmInput.classList.toggle("is-valid",   match);
        confirmInput.classList.toggle("is-invalid", !match);
      }

      pwInput.addEventListener("input",      checkMatch);
      confirmInput.addEventListener("input", checkMatch);
    });
  </script>
{% endblock %}
