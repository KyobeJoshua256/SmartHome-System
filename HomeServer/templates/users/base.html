<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="EBS SmartHome - Intelligent Home Automation System">
    <meta name="csrf-token" content="{{ csrf_token()|safe }}">
    <title>{% block title %}EBS SmartHome{% endblock %}</title>

    <!-- Favicon & PWA Icons -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/nora.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/nora.png') }}">
    <!-- <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}"> -->

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Variables & Base Styles -->
    <style>
        :root {
            /* ── Gradients ── */
            --primary-gradient:   linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --secondary-gradient: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            --ai-gradient:        linear-gradient(135deg, #0d9488 0%, #2563eb 100%);
            --surface-gradient:   linear-gradient(160deg, #eff6ff 0%, #e0f2fe 50%, #ecfdf5 100%);

            /* ── Brand Colors ── */
            --color-primary:       #2563eb;
            --color-primary-dark:  #1d4ed8;
            --color-primary-light: #dbeafe;
            --color-secondary:     #0d9488;
            --color-secondary-light: #ccfbf1;
            --color-accent:        #f59e0b;
            --color-warning:       #f59e0b;
            --color-success:       #0d9488;
            --color-error:         #dc2626;

            /* ── Backgrounds ── */
            --color-bg:            #eef3ff;
            --color-bg-card:       rgba(255, 255, 255, 0.72);
            --color-bg-modal:      rgba(248, 251, 255, 0.97);
            --color-surface:       #dbeafe;
            --color-surface-light: #eff6ff;
            --color-white:         #ffffff;

            /* ── Text ── */
            --color-text-primary:   #1e3a8a;
            --color-text-secondary: #3b5bdb;
            --color-text-muted:     #6b7eb8;
            --color-text-on-dark:   #ffffff;

            /* ── Borders ── */
            --color-border:        rgba(37, 99, 235, 0.15);
            --color-border-strong: rgba(37, 99, 235, 0.30);

            /* ── Shadows ── */
            --shadow-xs: 0 1px 4px rgba(37, 99, 235, 0.06);
            --shadow-sm: 0 2px 10px rgba(37, 99, 235, 0.10);
            --shadow-md: 0 6px 24px rgba(37, 99, 235, 0.14);
            --shadow-lg: 0 16px 48px rgba(37, 99, 235, 0.18);
            --shadow-glow:         0 0 28px rgba(37, 99, 235, 0.22);
            --shadow-glow-success: 0 0 28px rgba(13, 148, 136, 0.22);

            /* ── Border Radius ── */
            --radius-xs:   4px;
            --radius-sm:   8px;
            --radius-md:   16px;
            --radius-lg:   24px;
            --radius-xl:   32px;
            --radius-full: 9999px;

            /* ── Spacing ── */
            --space-xs:  0.25rem;
            --space-sm:  0.5rem;
            --space-md:  1rem;
            --space-lg:  2rem;
            --space-xl:  4rem;

            /* ── Typography ── */
            --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'DM Mono', monospace;

            /* ── Transitions ── */
            --transition-fast:   150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow:   500ms cubic-bezier(0.4, 0, 0.2, 1);

            /* ── Z-index ── */
            --z-background: -1;
            --z-base:        1;
            --z-floating:   10;
            --z-overlay:   100;
            --z-modal:    1000;
            --z-toast:    2000;
        }

        /* ═══════════════════════════════
           Reset & Base
        ═══════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            position: relative;

            /* Soft directional mesh */
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(37, 99, 235, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(13, 148, 136, 0.09) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(245, 158, 11, 0.05) 0%, transparent 60%);
        }

        /* ═══════════════════════════════
           Background Decoration
        ═══════════════════════════════ */
        .background-animation {
            position: fixed;
            inset: 0;
            z-index: var(--z-background);
            pointer-events: none;
            overflow: hidden;
        }

        .floating-orb {
            position: absolute;
            border-radius: var(--radius-full);
            filter: blur(72px);
            animation: floatOrb 22s infinite ease-in-out;
        }

        .orb-1 {
            width: 380px;
            height: 380px;
            background: #93c5fd;
            opacity: 0.18;
            top: -80px;
            left: -60px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 460px;
            height: 460px;
            background: #5eead4;
            opacity: 0.14;
            bottom: -100px;
            right: -80px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            background: #fcd34d;
            opacity: 0.10;
            top: 55%;
            left: 25%;
            animation-delay: -13s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0)      scale(1);    }
            25%       { transform: translate(60px, -40px) scale(1.08); }
            50%       { transform: translate(-30px, 70px) scale(0.94); }
            75%       { transform: translate(-70px, -30px) scale(1.04); }
        }

        /* Fine dot grid */
        .grid-lines {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(37, 99, 235, 0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: var(--z-background);
            pointer-events: none;
        }

        /* ═══════════════════════════════
           App Container
        ═══════════════════════════════ */
        .app-container {
            position: relative;
            z-index: var(--z-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ═══════════════════════════════
           Toast Notifications
        ═══════════════════════════════ */
        .toast-container {
            position: fixed;
            top: var(--space-lg);
            right: var(--space-lg);
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-width: 380px;
            width: 100%;
        }

        .toast {
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            background: var(--color-bg-modal);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            box-shadow: var(--shadow-lg);
            animation: toastSlideIn 0.3s ease forwards;
        }

        .toast[data-type="success"] {
            border-left: 4px solid var(--color-success);
            background: rgba(236, 253, 245, 0.97);
        }

        .toast[data-type="error"] {
            border-left: 4px solid var(--color-error);
            background: rgba(254, 242, 242, 0.97);
        }

        .toast[data-type="warning"] {
            border-left: 4px solid var(--color-warning);
            background: rgba(255, 251, 235, 0.97);
        }

        .toast[data-type="info"] {
            border-left: 4px solid var(--color-primary);
            background: rgba(239, 246, 255, 0.97);
        }

        .toast-icon {
            font-size: 1.2rem;
        }

        .toast[data-type="success"] .toast-icon { color: var(--color-success); }
        .toast[data-type="error"]   .toast-icon { color: var(--color-error); }
        .toast[data-type="warning"] .toast-icon { color: var(--color-warning); }
        .toast[data-type="info"]    .toast-icon { color: var(--color-primary); }

        .toast-content  { flex: 1; }

        .toast-title {
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: var(--space-xs);
            color: var(--color-text-primary);
        }

        .toast-message {
            font-size: 0.8125rem;
            color: var(--color-text-muted);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            padding: var(--space-xs);
            border-radius: var(--radius-sm);
            transition: background var(--transition-fast), color var(--transition-fast);
            line-height: 1;
        }

        .toast-close:hover {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }

        @keyframes toastSlideIn {
            from { transform: translateX(110%); opacity: 0; }
            to   { transform: translateX(0);   opacity: 1; }
        }

        @keyframes toastSlideOut {
            to { transform: translateX(110%); opacity: 0; }
        }

        /* ═══════════════════════════════
           Utility Classes
        ═══════════════════════════════ */
        .glass-effect {
            background: rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--color-border);
        }

        .card {
            background: var(--color-bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--space-lg);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-normal),
                        box-shadow var(--transition-normal),
                        border-color var(--transition-normal);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-border-strong);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-full);
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .btn:hover::after { opacity: 1; }

        .btn-primary {
            background: var(--primary-gradient);
            color: var(--color-text-on-dark);
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--color-white);
            color: var(--color-primary);
            border: 1.5px solid var(--color-primary-light);
            box-shadow: var(--shadow-xs);
        }

        .btn-secondary:hover {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn-ghost {
            background: transparent;
            color: var(--color-text-secondary);
            border: 1.5px solid var(--color-border);
        }

        .btn-ghost:hover {
            background: var(--color-surface-light);
            border-color: var(--color-border-strong);
        }

        .btn-success {
            background: var(--secondary-gradient);
            color: var(--color-text-on-dark);
            box-shadow: var(--shadow-glow-success);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13, 148, 136, 0.35);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: var(--radius-full);
        }

        .btn-sm {
            padding: var(--space-sm) var(--space-md);
            font-size: 0.8125rem;
        }

        .btn-lg {
            padding: calc(var(--space-md) * 1.25) calc(var(--space-lg) * 1.25);
            font-size: 1rem;
        }

        /* ── Badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .badge-primary {
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
        }

        .badge-success {
            background: var(--color-secondary-light);
            color: #0f5f58;
        }

        .badge-warning {
            background: #fef3c7;
            color: #78350f;
        }

        .badge-error {
            background: #fee2e2;
            color: #7f1d1d;
        }

        /* ── Form Elements ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.625rem var(--space-md);
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--color-border-strong);
            background: var(--color-white);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            font-size: 0.9375rem;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--color-text-muted);
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .form-control:invalid {
            border-color: var(--color-error);
        }

        .form-hint {
            font-size: 0.8125rem;
            color: var(--color-text-muted);
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: var(--space-lg) 0;
        }

        /* ── Link ── */
        a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        a:hover {
            color: var(--color-primary-dark);
        }

        /* ── Status Dot ── */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: var(--radius-full);
        }

        .status-dot.online  { background: var(--color-success); box-shadow: 0 0 0 2px rgba(13,148,136,0.25); }
        .status-dot.offline { background: var(--color-error);   box-shadow: 0 0 0 2px rgba(220,38,38,0.25); }
        .status-dot.idle    { background: var(--color-accent);  box-shadow: 0 0 0 2px rgba(245,158,11,0.25); }

        /* ── Avatar ── */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar-lg {
            width: 56px;
            height: 56px;
            font-size: 1.125rem;
        }

        /* ── Loader / Spinner ── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid var(--color-primary-light);
            border-top-color: var(--color-primary);
            border-radius: var(--radius-full);
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            html { font-size: 15px; }

            .toast-container {
                top: var(--space-md);
                right: var(--space-md);
                left: var(--space-md);
                max-width: none;
            }

            .btn {
                padding: var(--space-sm) var(--space-md);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: var(--space-md);
                border-radius: var(--radius-md);
            }
        }

        /* ── Accessibility ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration:       0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration:      0.01ms !important;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        :focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        ::selection {
            background-color: rgba(37, 99, 235, 0.20);
            color: var(--color-text-primary);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-surface-light);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(37, 99, 235, 0.25);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(37, 99, 235, 0.45);
        }
    </style>

    {% block extra_css %}{% endblock %}
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Background Decoration -->
    <div class="background-animation" aria-hidden="true">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
        <div class="grid-lines"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer" role="region" aria-label="Notifications" aria-live="polite"></div>

    <!-- Main App Container -->
    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    <!-- Toast Manager + Flash Messages -->
    <script>
        class ToastManager {
            constructor() {
                this.container = document.getElementById('toastContainer');
            }

            show({ type = 'info', title = '', message = '', duration = 5000 }) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.dataset.type = type;
                toast.setAttribute('role', 'alert');

                const icons = {
                    success: 'fa-circle-check',
                    error:   'fa-circle-exclamation',
                    warning: 'fa-triangle-exclamation',
                    info:    'fa-circle-info'
                };

                toast.innerHTML = `
                    <i class="toast-icon fas ${icons[type] || icons.info}" aria-hidden="true"></i>
                    <div class="toast-content">
                        ${title ? `<div class="toast-title">${this._escapeHtml(title)}</div>` : ''}
                        <div class="toast-message">${this._escapeHtml(message)}</div>
                    </div>
                    <button class="toast-close" aria-label="Dismiss notification">
                        <i class="fas fa-times" aria-hidden="true"></i>
                    </button>
                `;

                toast.querySelector('.toast-close').addEventListener('click', () => this.dismiss(toast));
                this.container.appendChild(toast);

                if (duration > 0) {
                    setTimeout(() => this.dismiss(toast), duration);
                }

                return toast;
            }

            dismiss(toast) {
                if (!toast || !toast.isConnected) return;
                toast.style.animation = 'toastSlideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }

            _escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        }

        window.toastManager = new ToastManager();

        document.addEventListener('DOMContentLoaded', () => {
            /* Flask flash messages injected via Jinja */
            const flashMessages = JSON.parse(
                '{{ get_flashed_messages(with_categories=true) | tojson | safe }}'
            );

            flashMessages.forEach(([category, message]) => {
                const typeMap = { success: 'success', error: 'error', warning: 'warning', danger: 'error' };
                const type = typeMap[category] || 'info';
                window.toastManager.show({
                    type,
                    title: type.charAt(0).toUpperCase() + type.slice(1),
                    message,
                    duration: 5000
                });
            });
        });

        /* Network status */
        window.addEventListener('online', () => {
            window.toastManager.show({
                type: 'success',
                title: 'Back online',
                message: 'Your connection has been restored.',
                duration: 3000
            });
        });

        window.addEventListener('offline', () => {
            window.toastManager.show({
                type: 'warning',
                title: 'No connection',
                message: 'Check your network — you are offline.',
                duration: 0
            });
        });

        /* PWA Service Worker */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('{{ url_for("static", filename="sw.js") }}')
                    .catch(err => console.warn('ServiceWorker registration failed:', err));
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
